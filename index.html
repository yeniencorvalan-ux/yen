<style>

*{
margin:0;

body{

/* LOGO INTRO */

#logoIntro{
position:fixed;
top:-300px;
left:50%;
transform:translateX(-50%);
width:240px;
z-index:1000;
animation:logoDrop 1.2s ease-out forwards;
}

@keyframes logoDrop{

0%{
top:-300px;
opacity:0;
}

100%{
top:110px;
opacity:1;
}

}

/* SCROLL VERTICAL */

.container{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.slide{
height:100vh;
scroll-snap-align:start;
position:relative;
}

/* CARRUSEL HORIZONTAL */

.carousel{
display:flex;
height:100%;
overflow-x:scroll;
scroll-snap-type:x mandatory;
}

.carousel img{
min-width:100%;
height:100%;
object-fit:cover;
scroll-snap-align:center;
cursor:pointer;
}

/* DEGRADE */

.overlay{
position:absolute;
bottom:0;
width:100%;
height:60%;
background:linear-gradient(
to top,
rgba(0,0,0,0.95),
rgba(0,0,0,0.5),
transparent
);
pointer-events:none;
}

/* TEXTO */

.content{
position:absolute;
bottom:120px;
left:30px;
z-index:2;
}

.logo{
width:120px;
margin-bottom:20px;
}

h1{

}

/* BOTON WHATSAPP */

.cta{

transform:translateX(-50%);
background:#ff4d00;
padding:16px 28px;
border-radius:50px;
font-weight:600;
z-index:999;
display:flex;
gap:15px;
align-items:center;
text-decoration:none;
color:white;
}

.cta span{
opacity:0.7;
}

/* VISOR FULLSCREEN */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

.viewer-carousel{
display:flex;
height:100%;
overflow-x:scroll;
scroll-snap-type:x mandatory;
}

.viewer-carousel img{
min-width:100%;
height:100%;
object-fit:contain;
scroll-snap-align:center;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:30px;
color:white;
z-index:10000;
cursor:pointer;
}

function openViewer(project,index){

});

setTimeout(()=>{

carousel.scrollTo({
left: window.innerWidth * index,
behavior: "instant"
});

},50);

}
